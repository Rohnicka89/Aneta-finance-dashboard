# Cloudflare Pages + D1 konfigurace
# Dokumentace: https://developers.cloudflare.com/pages/functions/wrangler-configuration/

name = "aneta-finance-dashboard"
compatibility_date = "2025-01-01"
pages_build_output_dir = "./dist"

# D1 databáze - ID získáš příkazem `npm run db:create` (uloží se sem automaticky)
# Pokud nasazuješ poprvé, smaž tento blok, vytvoř DB v Cloudflare dashboardu
# a propoj v Settings → Functions → D1 database bindings
[[d1_databases]]
binding = "DB"
database_name = "aneta-finance-db"
database_id = "PLACEHOLDER-ZÍSKÁŠ-PO-VYTVOŘENÍ-DB"

# Lokální dev build (npm run dev používá Vite, ne wrangler)
[env.production]
name = "aneta-finance-dashboard"
