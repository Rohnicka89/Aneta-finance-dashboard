name: Process Raiffka PDF statements

# Spouští se přes Apps Script (repository_dispatch) nebo manuálně z UI
on:
  repository_dispatch:
    types: [process-statements]
  workflow_dispatch:
    inputs:
      pdf_base64:
        description: 'Base64 encoded PDF (manuální test)'
        required: false
        type: string

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./scripts
        run: npm install

      - name: Process statements
        working-directory: ./scripts
        env:
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
          DASHBOARD_TOKEN: ${{ secrets.DASHBOARD_TOKEN }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          PDF_BASE64_LIST: ${{ toJson(github.event.client_payload.pdfs) }}
          PDF_BASE64: ${{ inputs.pdf_base64 }}
          PDF_FILENAME: manual-test.pdf
        run: node process-statements.js
